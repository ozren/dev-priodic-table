<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sustainable Product Engineering — 100 essential concepts organized by category, with curated references.">
<meta name="theme-color" content="#2c3e50">
<title>Sustainable Product Engineering</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Sustainable Product Engineering</h1>
    <p class="subtitle">Green Product Thinking &middot; Drive &middot; Metrics &middot; LeSS &middot; Green Dev &middot; Sustainable Architecture &middot; GreenOps</p>
  </header>

  <div class="controls">
    <input type="text" id="search" class="search-box" placeholder="Search by term, symbol, or definition..." aria-label="Search concepts">
    <div class="filter-buttons" role="group" aria-label="Filter by category">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="product">Product</button>
      <button class="filter-btn" data-filter="drive">Drive</button>
      <button class="filter-btn" data-filter="metrics">Metrics</button>
      <button class="filter-btn" data-filter="less">LeSS</button>
      <button class="filter-btn" data-filter="greendev">Green Dev</button>
      <button class="filter-btn" data-filter="architecture">Architecture</button>
      <button class="filter-btn" data-filter="greenops">GreenOps</button>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="table-wrapper">
    <div class="periodic-table" id="table" role="grid" aria-label="Sustainable Product Engineering concepts"></div>
  </div>

  <div class="footer">
    <p>Click any element for definition and curated references &middot; Concept evolved from GreenOps &amp; Green Dev via LeSS and Pink&rsquo;s <em>Drive</em> &middot; <a href="docs/sustainable_product_engineering.md">read the manifesto</a></p>
  </div>
</div>

<div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-body">
  <div class="modal-content">
    <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
