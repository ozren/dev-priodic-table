<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sustainable Product Engineering — 100 essential concepts organized by category, with curated references.">
<meta name="theme-color" content="#2c3e50">
<title>Sustainable Product Engineering</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Sustainable Product Engineering</h1>
    <p class="subtitle">Product Thinking &middot; People &amp; Culture &middot; Organization &amp; Structure &middot; Flow &amp; Measurement &middot; Engineering &amp; Systems</p>
  </header>

  <div class="controls">
    <input type="text" id="search" class="search-box" placeholder="Search by term, symbol, or definition..." aria-label="Search concepts">
    <div class="filter-buttons" role="group" aria-label="Filter by category">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="product">Product</button>
      <button class="filter-btn" data-filter="people">People</button>
      <button class="filter-btn" data-filter="org">Organization</button>
      <button class="filter-btn" data-filter="flow">Flow</button>
      <button class="filter-btn" data-filter="engineering">Engineering</button>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="table-wrapper">
    <div class="periodic-table" id="table" role="grid" aria-label="Sustainable Product Engineering concepts"></div>
  </div>

  <div class="footer">
    <p>Click any element for definition and curated references &middot; <a href="docs/categories_and_tiles.md">categories &amp; tiles</a> &middot; <a href="docs/sustainable_product_engineering.md">manifesto</a></p>
  </div>
</div>

<div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-body">
  <div class="modal-content">
    <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
